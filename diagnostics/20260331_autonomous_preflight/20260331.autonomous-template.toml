# Draft PyMMM autonomous config generated by preflight.
# FILL IN after inspecting preflight PNGs.
# Keep this file next to the preflight diagnostics so the choices are auditable.

[source]
source_nd2 = "/data/20260331_SB5_6_7_8_16/20260331.nd2"
pixel_size_um = 0.107869821220548
time_interval_ms = 300000.0
channel_names = ["PC", "CFP", "mVenus", "mCherry"]
sizes = { C = 4, P = 25, T = 8, X = 2304, Y = 2304 }

[pipeline]
registration_channel = "PC"
detection_channel = "PC"
registration_mode = "mean"

[rotation]
# Use "fixed" only if you know the angle. Use "auto" for bounded search.
mode = "fixed"
fixed_degrees = 0.0
search_min = -5.0
search_max = 5.0
coarse_step = 0.5
fine_step = 0.1
sample_fovs = 5
min_score_margin = 0.05
max_fov_disagreement_deg = 0.5

[detection]
# FILL IN after inspecting preflight PNGs.
min_lanes_per_fov = 2
max_lanes_per_fov = 2
min_trenches_per_lane = 45
max_trenches_per_lane = 60

# These are algorithm parameters, not biological priors. Leave blank values at
# the defaults for the first diagnostic pass unless the raw images make them
# obviously wrong.
lane_sigma = 40.0
lane_distance = 300.0
lane_height = 5000.0
trench_sigma = 4.0
trench_distance = 100.0
trench_prominence = 10.0
trench_length = 160
trench_bottom_offset = 50
trench_width = 20

[qc]
# Smooth long-term drift is allowed; this catches discrete registration jumps.
max_drift_jump_px = 8.0
drift_jump_mad_multiplier = 8.0
max_trench_spacing_cv = 0.35
min_nonzero_fraction = 0.001
max_saturated_fraction = 0.30
representative_trenches = 8

[output]
diagnostics_dir = "diagnostics/20260331_autonomous"
output_path = "20260331.trenches.zarr"
overwrite_verified_output = false
compressor = "zstd"
clevel = 9

[resources]
registration_n_jobs = -1
show_progress = true
